<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Return Equipment — Airtel IMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="sidebar">
  <a class="sidebar-brand" th:href="@{/}"><div class="brand-icon">A</div><div class="brand-text"><span class="brand-name">Airtel IMS</span><span class="brand-sub">v1.0.0</span></div></a>
  <div class="sidebar-section"><div class="sidebar-section-label">Main</div>
    <nav class="sidebar-nav">
      <a th:href="@{/dashboard}"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a th:href="@{/assets}"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Assets</a>
      <a th:href="@{/assignments}" class="active"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>Issue / Return</a>
    </nav>
  </div>
  <div class="sidebar-section"><div class="sidebar-section-label">Management</div>
    <nav class="sidebar-nav">
      <a th:href="@{/employees}"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Employees</a>
      <a th:href="@{/departments}"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-4h6v4"/></svg>Departments</a>
    </nav>
  </div>
  <div class="sidebar-footer"><div class="sidebar-footer-text">Airtel Rwanda · Offline Mode</div></div>
</nav>

<div class="main-wrapper">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">Process Return</span>
      <span class="topbar-subtitle" th:text="'Assignment #' + ${assignment.id}"></span>
    </div>
    <div class="topbar-right">
      <a th:href="@{/assignments}" class="btn btn-secondary">← Back</a>
    </div>
  </div>

  <main class="page-content">
    <!-- Summary -->
    <div class="card" style="margin-bottom:16px;">
      <div class="card-header"><span class="card-title"><span class="card-title-dot"></span>Assignment Summary</span></div>
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-key">Asset</div>
          <div class="detail-value">
            <span class="asset-tag" th:text="${assignment.asset.assetTag}"></span>
            <span style="margin-left:8px;" th:text="${assignment.asset.brand + ' ' + assignment.asset.model}"></span>
          </div>
        </div>
        <div class="detail-item"><div class="detail-key">Employee</div>
          <div class="detail-value" th:text="${assignment.employee.fullName + ' [' + assignment.employee.employeeId + ']'}"></div>
        </div>
        <div class="detail-item"><div class="detail-key">Issue Date</div><div class="detail-value" th:text="${assignment.issueDate}"></div></div>
        <div class="detail-item"><div class="detail-key">Expected Return</div>
          <div th:class="'detail-value' + (${assignment.expectedReturnDate != null and assignment.expectedReturnDate.isBefore(#temporals.createToday())} ? ' text-red' : '')"
               th:text="${assignment.expectedReturnDate ?: '—'}"></div>
        </div>
        <div class="detail-item"><div class="detail-key">Condition at Issue</div>
          <div class="detail-value">
            <span th:with="c=${assignment.conditionOnIssue.name().toLowerCase()}"
                  th:class="'badge badge-' + ${c}"
                  th:text="${assignment.conditionOnIssue.name()}"></span>
          </div>
        </div>
        <div class="detail-item"><div class="detail-key">Purpose</div><div class="detail-value" th:text="${assignment.purpose ?: '—'}"></div></div>
      </div>
    </div>

    <!-- Return Form -->
    <form th:action="@{/assignments/{id}/return(id=${assignment.id})}" method="post">
      <div class="card">
        <div class="card-header"><span class="card-title"><span class="card-title-dot"></span>Return Details</span></div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group">
              <label>Condition on Return <span class="required">*</span></label>
              <select name="conditionOnReturn" required>
                <option value="">Select condition…</option>
                <th:block th:each="c : ${conditionStatuses}">
                  <option th:unless="${c.name() == 'DECOMMISSIONED'}"
                          th:value="${c}" th:text="${c.name()}"></option>
                </th:block>
              </select>
            </div>
            <div class="form-group">
              <label>Received By <span class="required">*</span></label>
              <input type="text" name="returnedBy" required placeholder="Name of person receiving the device"/>
            </div>
            <div class="form-group full">
              <label>Return Notes</label>
              <textarea name="returnNotes" placeholder="Note any damage, missing accessories, or other observations…"></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <a th:href="@{/assignments}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-success">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M5 13l4 4L19 7"/></svg>
          Confirm Return
        </button>
      </div>
    </form>
  </main>
</div>
</body>
</html>
