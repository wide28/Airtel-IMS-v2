<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${formTitle} + ' — Airtel IMS'">Employee Form</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="sidebar">
  <a class="sidebar-brand" th:href="@{/}"><div class="brand-icon">A</div><div class="brand-text"><span class="brand-name">Airtel IMS</span><span class="brand-sub">v1.0.0</span></div></a>
  <div class="sidebar-section"><div class="sidebar-section-label">Main</div>
    <nav class="sidebar-nav">
      <a th:href="@{/dashboard}"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a th:href="@{/assets}"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Assets</a>
      <a th:href="@{/assignments}"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>Issue / Return</a>
    </nav>
  </div>
  <div class="sidebar-section"><div class="sidebar-section-label">Management</div>
    <nav class="sidebar-nav">
      <a th:href="@{/employees}" class="active"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Employees</a>
      <a th:href="@{/departments}"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-4h6v4"/></svg>Departments</a>
    </nav>
  </div>
  <div class="sidebar-footer"><div class="sidebar-footer-text">Airtel Rwanda · Offline Mode</div></div>
</nav>

<div class="main-wrapper">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title" th:text="${formTitle}">Employee Form</span>
    </div>
    <div class="topbar-right">
      <a th:href="@{/employees}" class="btn btn-secondary">← Back</a>
    </div>
  </div>

  <main class="page-content">
    <form th:action="@{/employees/save}" th:object="${employee}" method="post">
      <input type="hidden" th:field="*{id}"/>
      <div class="card">
        <div class="card-header">
          <span class="card-title"><span class="card-title-dot"></span>Employee Information</span>
        </div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group">
              <label>Employee ID <span class="required">*</span></label>
              <input type="text" th:field="*{employeeId}" placeholder="e.g. ATL006"
                     th:class="${#fields.hasErrors('employeeId')} ? 'is-invalid' : ''"/>
              <span class="field-error" th:if="${#fields.hasErrors('employeeId')}" th:errors="*{employeeId}"></span>
            </div>
            <div class="form-group">
              <label>Full Name <span class="required">*</span></label>
              <input type="text" th:field="*{fullName}" placeholder="Full name"
                     th:class="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"/>
              <span class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
            </div>
            <div class="form-group">
              <label>Job Title</label>
              <input type="text" th:field="*{jobTitle}" placeholder="e.g. Network Engineer"/>
            </div>
            <div class="form-group">
              <label>Department</label>
              <select th:field="*{department.id}">
                <option value="">— None —</option>
                <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"
                        th:selected="${employee.department != null and employee.department.id == d.id}"></option>
              </select>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" th:field="*{email}" placeholder="employee@airtel.rw"
                     th:class="${#fields.hasErrors('email')} ? 'is-invalid' : ''"/>
              <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" th:field="*{phone}" placeholder="+250 78x xxx xxx"/>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <a th:href="@{/employees}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Employee</button>
      </div>
    </form>
  </main>
</div>
</body>
</html>
