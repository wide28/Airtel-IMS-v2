<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${formTitle} + ' — Airtel IMS'">Asset Form — Airtel IMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="sidebar">
  <a class="sidebar-brand" th:href="@{/}"><div class="brand-icon">A</div><div class="brand-text"><span class="brand-name">Airtel IMS</span><span class="brand-sub">v1.0.0</span></div></a>
  <div class="sidebar-section"><div class="sidebar-section-label">Main</div>
    <nav class="sidebar-nav">
      <a th:href="@{/dashboard}"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a th:href="@{/assets}" class="active"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Assets</a>
      <a th:href="@{/assignments}"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>Issue / Return</a>
    </nav>
  </div>
  <div class="sidebar-section"><div class="sidebar-section-label">Management</div>
    <nav class="sidebar-nav">
      <a th:href="@{/employees}"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Employees</a>
      <a th:href="@{/departments}"><svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-4h6v4"/></svg>Departments</a>
    </nav>
  </div>
  <div class="sidebar-footer"><div class="sidebar-footer-text">Airtel Rwanda · Offline Mode</div></div>
</nav>

<div class="main-wrapper">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title" th:text="${formTitle}">Asset Form</span>
      <span class="topbar-subtitle">Fill in all required fields</span>
    </div>
    <div class="topbar-right">
      <a th:href="@{/assets}" class="btn btn-secondary">← Back to Assets</a>
    </div>
  </div>

  <main class="page-content">
    <form th:action="@{/assets/save}" th:object="${asset}" method="post">
      <input type="hidden" th:field="*{id}"/>

      <!-- Identification -->
      <div class="card" style="margin-bottom:16px;">
        <div class="card-header">
          <span class="card-title"><span class="card-title-dot"></span>Device Identification</span>
        </div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group">
              <label>Asset Tag <span class="required">*</span></label>
              <input type="text" th:field="*{assetTag}" placeholder="e.g. ATL-LT-006"
                     th:class="${#fields.hasErrors('assetTag')} ? 'is-invalid' : ''"/>
              <span class="field-error" th:if="${#fields.hasErrors('assetTag')}" th:errors="*{assetTag}"></span>
            </div>
            <div class="form-group">
              <label>Device Type <span class="required">*</span></label>
              <select th:field="*{deviceType}" th:class="${#fields.hasErrors('deviceType')} ? 'is-invalid' : ''">
                <option value="">Select type…</option>
                <option th:each="t : ${deviceTypes}" th:value="${t}" th:text="${t.name().replace('_',' ')}"></option>
              </select>
              <span class="field-error" th:if="${#fields.hasErrors('deviceType')}" th:errors="*{deviceType}"></span>
            </div>
            <div class="form-group">
              <label>Brand <span class="required">*</span></label>
              <input type="text" th:field="*{brand}" placeholder="e.g. Dell, HP, Lenovo"
                     th:class="${#fields.hasErrors('brand')} ? 'is-invalid' : ''"/>
              <span class="field-error" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></span>
            </div>
            <div class="form-group">
              <label>Model <span class="required">*</span></label>
              <input type="text" th:field="*{model}" placeholder="e.g. Latitude 5520"
                     th:class="${#fields.hasErrors('model')} ? 'is-invalid' : ''"/>
              <span class="field-error" th:if="${#fields.hasErrors('model')}" th:errors="*{model}"></span>
            </div>
            <div class="form-group">
              <label>Serial Number <span class="required">*</span></label>
              <input type="text" th:field="*{serialNumber}" placeholder="Device serial number"
                     th:class="${#fields.hasErrors('serialNumber')} ? 'is-invalid' : ''"/>
              <span class="field-error" th:if="${#fields.hasErrors('serialNumber')}" th:errors="*{serialNumber}"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Specifications -->
      <div class="card" style="margin-bottom:16px;">
        <div class="card-header">
          <span class="card-title"><span class="card-title-dot"></span>Technical Specifications</span>
        </div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group">
              <label>Processor / CPU</label>
              <input type="text" th:field="*{processor}" placeholder="e.g. Intel Core i5-11th Gen"/>
            </div>
            <div class="form-group">
              <label>RAM (GB)</label>
              <input type="number" th:field="*{ramGb}" placeholder="e.g. 16" min="0"/>
            </div>
            <div class="form-group">
              <label>Storage (GB)</label>
              <input type="number" th:field="*{storageGb}" placeholder="e.g. 512" min="0"/>
            </div>
            <div class="form-group">
              <label>Operating System</label>
              <input type="text" th:field="*{os}" placeholder="e.g. Windows 11 Pro"/>
            </div>
          </div>
        </div>
      </div>

      <!-- Procurement & Status -->
      <div class="card" style="margin-bottom:16px;">
        <div class="card-header">
          <span class="card-title"><span class="card-title-dot"></span>Procurement &amp; Status</span>
        </div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group">
              <label>Purchase Date</label>
              <input type="date" th:field="*{purchaseDate}"/>
            </div>
            <div class="form-group">
              <label>Warranty Expiry</label>
              <input type="date" th:field="*{warrantyExpiry}"/>
            </div>
            <div class="form-group">
              <label>Condition</label>
              <select th:field="*{conditionStatus}">
                <option th:each="c : ${conditionStatuses}" th:value="${c}" th:text="${c.name()}"></option>
              </select>
            </div>
            <div class="form-group" th:if="${asset.id != null}">
              <label>Status</label>
              <select th:field="*{status}">
                <option th:each="s : ${assetStatuses}" th:value="${s}" th:text="${s.name().replace('_',' ')}"></option>
              </select>
            </div>
            <div class="form-group">
              <label>Department</label>
              <select th:field="*{department.id}">
                <option value="">— None —</option>
                <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"
                        th:selected="${asset.department != null and asset.department.id == d.id}"></option>
              </select>
            </div>
            <div class="form-group full">
              <label>Notes</label>
              <textarea th:field="*{notes}" placeholder="Any additional notes about this device…"></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <a th:href="@{/assets}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M5 13l4 4L19 7"/></svg>
          Save Asset
        </button>
      </div>
    </form>
  </main>
</div>
</body>
</html>
