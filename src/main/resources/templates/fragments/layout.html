<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle != null ? pageTitle + ' — Airtel IMS' : 'Airtel IMS'}">Airtel IMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <th:block th:fragment="head-extra"></th:block>
</head>
<body>

<!-- ═══ SIDEBAR ═══════════════════════════════════════════════ -->
<nav class="sidebar">
  <a class="sidebar-brand" th:href="@{/}">
    <div class="brand-icon">A</div>
    <div class="brand-text">
      <span class="brand-name">Airtel IMS</span>
      <span class="brand-sub">v1.0.0</span>
    </div>
  </a>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Main</div>
    <nav class="sidebar-nav">
      <a th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard'} ? ' active'">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </a>
      <a th:href="@{/assets}" th:classappend="${activePage == 'assets'} ? ' active'">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        Assets
      </a>
      <a th:href="@{/assignments}" th:classappend="${activePage == 'assignments'} ? ' active'">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <path d="M9 12h6M9 16h4"/>
        </svg>
        Issue / Return
      </a>
    </nav>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">Management</div>
    <nav class="sidebar-nav">
      <a th:href="@{/employees}" th:classappend="${activePage == 'employees'} ? ' active'">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        Employees
      </a>
      <a th:href="@{/departments}" th:classappend="${activePage == 'departments'} ? ' active'">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-4h6v4"/>
        </svg>
        Departments
      </a>
    </nav>
  </div>

  <div class="sidebar-footer">
    <div class="sidebar-footer-text">Airtel Rwanda · Offline Mode</div>
  </div>
</nav>
<!-- ════════════════════════════════════════════════════════════ -->

<div class="main-wrapper">
  <div th:replace="~{this :: topbar}"></div>

  <main class="page-content">
    <!-- Flash Messages -->
    <div th:if="${successMessage}" class="alert alert-success">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" d="M5 13l4 4L19 7"/>
      </svg>
      <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-error">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
      </svg>
      <span th:text="${errorMessage}"></span>
    </div>

    <th:block th:fragment="page-content">
      <!-- Page content goes here -->
    </th:block>
  </main>
</div>

</body>
</html>
