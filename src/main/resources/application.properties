spring.application.name=Airtel IMS

# Server (Render provides PORT, fallback to 8080 locally)
server.port=${PORT:8080}
server.servlet.context-path=/

# Database Connection (Cloud ready with local XAMPP fallback)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/airtel_ims?useSSL=false&serverTimezone=Africa/Kigali&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate 
# Changed to 'update' so Spring Boot builds the tables automatically in the cloud!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# Static Resources
spring.web.resources.static-locations=classpath:/static/

# Pagination
spring.data.web.pageable.default-page-size=15
